<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizMaster - MCQ Quiz App</title>
    
    <!-- Styles -->
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/responsive.css">
</head>
<body class="dark-theme">
    <div id="app">
        <div style="text-align: center; padding: 60px 20px;">
            <h2>Loading Quiz App...</h2>
            <p style="color: var(--text-secondary);">Please wait while we initialize the database</p>
        </div>
    </div>

    <!-- Dexie.js - IndexedDB Library -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    
    <!-- Core scripts -->
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/modal.js"></script>
    
    <!-- Component scripts -->
    <script src="components/dashboard.js"></script>
    <script src="components/course-view.js"></script>
    <script src="components/quiz-input.js"></script>
    <script src="components/quiz-taking.js"></script>
    <script src="components/quiz-results.js"></script>
    <script src="components/settings.js"></script>
    <script src="components/help.js"></script>
    
    <!-- Main app initialization -->
    <script src="js/app.js"></script>
</body>
</html>
